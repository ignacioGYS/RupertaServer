version: '3.8'

services:
  app-monitor:
    build: .
    container_name: ruperta-monitor
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: ruperta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ruperta
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ruperta_secure_pass}
      POSTGRES_DB: ruperta_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
